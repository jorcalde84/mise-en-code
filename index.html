  const gridRef = useRef(null);

  /* Measurement — relative to the grid container so SVG can be overlaid in same coord system */
  useLayoutEffect(() => {
    const measure = () => {
      if (!gridRef.current) return;
      const contRect = gridRef.current.getBoundingClientRect();
      const pos = {};
      let hasAny = false;
      Object.entries(cellRefs.current).forEach(([id, el]) => {
        if (!el) return;
        const r = el.getBoundingClientRect();
        pos[id] = {
          top: r.top - contRect.top,
          left: r.left - contRect.left,
          width: r.width,
          height: r.height,
        };
        hasAny = true;
      });
      if (hasAny) setLayout(pos);
      setBounds({ w: contRect.width, h: gridRef.current.scrollHeight });
    };

    /* Run twice: once synchronously, once after paint for fonts/images */
    measure();
    const raf = requestAnimationFrame(measure);

    /* Observe container + every cell for size changes */
    const ro = new ResizeObserver(measure);
    if (gridRef.current) ro.observe(gridRef.current);
    Object.values(cellRefs.current).forEach(el => el && ro.observe(el));

    window.addEventListener("resize", measure);
    return () => { cancelAnimationFrame(raf); ro.disconnect(); window.removeEventListener("resize", measure); };
  }, [prep, rows, lanes, sv]); /* sv changes quantity text which can alter heights */

  /* Connectors: vertical (within same lane, consecutive rows of non-null cells), horizontal (connectsTo), and merges */
  const connectors = useMemo(() => {
    if (!layout) return { vert: [], horiz: [] };
    const vert = [], horiz = [];
    /* Vertical: for each cell, find next non-null in SAME lane.
       Safely handles cases where grid rows have different lengths. */
    for (let li = 0; li < lanes; li++) {
      for (let ri = 0; ri < rows; ri++) {
        const row = grid[ri] || [];
        const cur = row[li];
        if (!cur) continue;
        /* find the immediately next cell below in the SAME lane that has content */
        for (let ni = ri + 1; ni < rows; ni++) {
          const nextRow = grid[ni] || [];
          const nx = nextRow[li];
          if (nx) { vert.push({ from: cur.id, to: nx.id }); break; }
        }
      }
    }
    /* Horizontal connectsTo (explicit left/right connection between lanes at same row) */
    grid.forEach((row, ri) => row.forEach((step, li) => {
      if (step?.connectsTo) step.connectsTo.forEach(ct => {
        for (let r2 = 0; r2 < rows; r2++) {
          const r2Row = grid[r2] || [];
          for (let l2 = 0; l2 < r2Row.length; l2++) {
            const s = r2Row[l2];
            if (s && s.id === ct.targetId) horiz.push({ from: step.id, to: s.id, side: ct.side });
          }
        }
      });
    }));
    return { vert, horiz };
  }, [layout, grid, rows, lanes]);

  return (<div style={{ marginBottom:48 }}>
    {/* Header */}
    <div style={{ display:"flex",justifyContent:"center",marginBottom:8 }}>
      <div style={{ background:asModule?"#9B7EB812":"#2A242006",border:asModule?`1.5px solid #9B7EB840`:"1.5px solid #D5CEBC",borderRadius:10,padding:"10px 22px",textAlign:"center" }}>
        {asModule && <div style={{ fontFamily:"'JetBrains Mono',monospace",fontSize:9,fontWeight:700,letterSpacing:1.2,textTransform:"uppercase",padding:"2px 7px",borderRadius:4,color:"#9B7EB8",background:"#9B7EB815",display:"inline-block",marginBottom:3 }}><Ic.Mo/> {t.module}</div>}
        {asModule && prep.fromRecipe && <div style={{ fontFamily:"'Playfair Display',serif",fontSize:14,fontWeight:600,color:"#9B7EB8",marginBottom:2 }}>{prep.fromRecipe}</div>}
        <div style={{ fontFamily:"'Playfair Display',serif",fontSize:asModule && prep.fromRecipe ? 13 : 18,fontWeight:600,color:asModule && prep.fromRecipe ? "#6A6058" : undefined }}>{prep.name}</div>
        {prep.comment && <div style={{ fontFamily:"'DM Sans',sans-serif",fontSize:11,color:"#B0A898",marginTop:2,fontStyle:"italic" }}>{prep.comment}</div>}
        {asModule && anchor?.prepId && anchor?.stepId && (()=>{
          const tgtPrep = rc.preparations.find(p=>p.id===anchor.prepId);
          const tgtStep = tgtPrep ? flattenGrid(tgtPrep.grid).find(s=>s.id===anchor.stepId) : null;
          return tgtStep ? <div style={{ display:"inline-flex",alignItems:"center",gap:5,fontFamily:"'DM Sans',sans-serif",fontSize:10,color:PC,marginTop:6,padding:"3px 8px",borderRadius:12,background:PC+"12",border:`1px solid ${PC}30` }}>
            <span style={{ fontSize:11 }}>&#8605;</span>
            <span style={{ opacity:0.75 }}>{t.moduleAnchor}</span>
            <b>{tgtPrep.name} &rarr; {tgtStep.title}</b>
          </div> : null;
        })()}
      </div>
    </div>

    {/* Lane names — merged: main lanes + module lanes with a visual divider between groups */}
    <div style={{ display:"flex",justifyContent:"center",marginBottom:10 }}>
      <div style={{ display:"flex",gap:LANE_GAP,width:totalW,alignItems:"flex-end" }}>
        {Array.from({length:lanes}).map((_,li) => {
          const name = mergedModInfo.laneNames[li] || (li === 0 ? t.mainProc : `${t.lane||"Lane"} ${li+1}`);
          const isModLane = mergedModInfo.moduleLaneBoundaries.some(b => li >= b.startLane && li < b.startLane + b.count);
          const isModStart = mergedModInfo.moduleLaneBoundaries.some(b => b.startLane === li);
          return (<div key={li} style={{ display:"flex",alignItems:"flex-end" }}>
            {/* Purple divider before first module lane */}
            {isModStart && <div style={{ width:3,height:28,background:PC+"50",borderRadius:2,marginRight:LANE_GAP/2 - 2,flexShrink:0 }}/>}
            <div style={{ width:LANE_W,textAlign:"center",fontFamily:"'DM Sans',sans-serif",fontSize:11,fontWeight:700,letterSpacing:0.4,color:isModLane?PC:"#5A5048",paddingBottom:6,borderBottom:`2px solid ${isModLane?PC+"50":LANE_COL+"60"}`,textTransform:"uppercase" }}>
              {isModStart && <div style={{ fontFamily:"'JetBrains Mono',monospace",fontSize:8,letterSpacing:1,color:PC,opacity:0.7,marginBottom:2 }}>{t.module}</div>}
              {name}
            </div>
          </div>);
        })}
      </div>
    </div>

    {/* Grid with measured overlay */}
    <div style={{ display:"flex",justifyContent:"center" }}>
      <div ref={gridRef} style={{ position:"relative",width:totalW }}>
        {/* SVG overlay — matches gridRef's own box exactly so layout coords align */}
        {layout && <svg
          width={bounds.w || totalW}
          height={bounds.h || 0}
          style={{ position:"absolute",top:0,left:0,pointerEvents:"none",zIndex:1,overflow:"visible" }}>
          <defs>
            <marker id={`arr-${prep.id}`} markerWidth="6" markerHeight="6" refX="5" refY="3" orient="auto"><path d="M0,0 L6,3 L0,6 Z" fill={LANE_COL}/></marker>
            <marker id={`arrH-${prep.id}`} markerWidth="4" markerHeight="4" refX="3" refY="2" orient="auto"><path d="M0,0 L4,2 L0,4 Z" fill="#6BAF6E"/></marker>
          </defs>

          {/* Vertical arrows: actual bottom of source box \u2192 actual top of target box */}
          {connectors.vert.map(({ from, to }, i) => {
            const a = layout[from], b = layout[to];
            if (!a || !b) return null;
            const x1 = a.left + a.width/2;
            const y1 = a.top + a.height + 1;  /* just outside source bottom */
            const x2 = b.left + b.width/2;
            const y2 = b.top - 2;              /* just above target top so arrowhead tip touches edge */
            return <path key={`v-${i}`} d={`M ${x1} ${y1} L ${x2} ${y2}`} stroke={LANE_COL} strokeWidth="2" fill="none" markerEnd={`url(#arr-${prep.id})`}/>;
          })}

          {/* Horizontal connectors between lanes (Visio-style elbow routing).
              Exit source from left/right edge, turn 90° once or twice as needed, approach target on opposite edge. */}
          {connectors.horiz.map(({ from, to, side }, i) => {
            const a = layout[from], b = layout[to];
            if (!a || !b) return null;
            /* Source exit point: midpoint of source's chosen edge */
            const yA = a.top + a.height/2;
            const xA = side === "right" ? a.left + a.width : a.left;
            /* Target entry point: midpoint of target's opposite edge */
            const oppSide = side === "right" ? "left" : "right";
            const yB = b.top + b.height/2;
            const xB = oppSide === "left" ? b.left : b.left + b.width;

            /* Outward offset so the path exits clearly from the box */
            const OUT = 12;
            const xA2 = side === "right" ? xA + OUT : xA - OUT;
            const xB2 = oppSide === "left" ? xB - OUT : xB + OUT;

            let d;
            if (Math.abs(yA - yB) < 2) {
              /* Same row — straight arrow with small exit segments */
              d = `M ${xA} ${yA} L ${xA2} ${yA} L ${xB2} ${yB} L ${xB} ${yB}`;
            } else {
              /* Different rows — elbow: exit, go horizontally to midpoint between lanes, go vertically, then approach target */
              const midX = (xA2 + xB2) / 2;
              d = `M ${xA} ${yA} L ${xA2} ${yA} L ${midX} ${yA} L ${midX} ${yB} L ${xB2} ${yB} L ${xB} ${yB}`;
            }
            return <path key={`h-${i}`} d={d} stroke="#6BAF6E" strokeWidth="2" fill="none" markerEnd={`url(#arrH-${prep.id})`}/>;
          })}

        </svg>}

        <div style={{ display:"grid",gridTemplateColumns:`repeat(${lanes}, ${LANE_W}px)`,gap:`18px ${LANE_GAP}px`,width:totalW,position:"relative",zIndex:2,gridAutoRows:"auto",alignItems:"stretch" }}>
          {grid.flatMap((row, ri) => Array.from({length:lanes}).map((_, li) => {
            const step = row[li];
            const isModLane = mergedModInfo.moduleLaneBoundaries.some(b => li >= b.startLane && li < b.startLane + b.count);
            const isModStart = mergedModInfo.moduleLaneBoundaries.some(b => b.startLane === li);
            return (<div key={`${ri}-${li}`} style={{ display:"flex",alignItems:"stretch",justifyContent:"center",minHeight:60,borderLeft:isModStart?`2px dashed ${PC}30`:"none",paddingLeft:isModStart?8:0 }}>
              {step ? <div ref={el => {
                if (el) {
                  cellRefs.current[step.id] = el;
                  if (recipeStepRefs) recipeStepRefs.current[step.id] = el;
                } else {
                  delete cellRefs.current[step.id];
                  if (recipeStepRefs) delete recipeStepRefs.current[step.id];
                }
              }} style={{ width:"100%",display:"flex",flexDirection:"column" }}>
                <StepNode step={step} rc={rc} allIngs={allIngs} flat={flat} tLib={tLib} sv={sv} base={base} t={t} lang={lang}/>
              </div> : <div style={{ width:"100%" }}/>}
            </div>);
          }))}
        </div>
      </div>
    </div>
  </div>);
}

function StepNode({ step, rc, allIngs, flat, tLib, sv, base, t, lang }) {
  const hasTool = !!step.tool;
  const meta = hasTool ? tMeta(step.tool.toolId, tLib) : null;
  const toolStr = hasTool ? fmtOpts(step.tool.opts, meta) : "";
  return (<Tip tx={step.instruction} ch={
    <div style={{ background:hasTool?TC+"08":"#FFF",border:hasTool?`1.5px solid ${TC}30`:"1.5px solid #E0D9CF",borderRadius:12,padding:"10px 14px",width:"100%",textAlign:"center",cursor:"default",boxShadow:"0 2px 12px rgba(42,36,32,0.06)",transition:"all 0.2s",boxSizing:"border-box",flex:1,display:"flex",flexDirection:"column",justifyContent:"center" }}
      onMouseEnter={e=>{e.currentTarget.style.boxShadow="0 6px 24px rgba(42,36,32,0.10)";}} onMouseLeave={e=>{e.currentTarget.style.boxShadow="0 2px 12px rgba(42,36,32,0.06)";}}>
      <div style={{ marginBottom:4 }}>
        <span style={{ fontFamily:"'Playfair Display',serif",fontSize:13,fontWeight:600 }}>{step.title || t.step}</span>
      </div>
      {step.processes?.length > 0 && <div style={{ display:"flex",justifyContent:"center",gap:3,flexWrap:"wrap",marginBottom:4,width:"100%",flexDirection:"column",alignItems:"center" }}>
        <div style={{ display:"flex",justifyContent:"center",gap:3,flexWrap:"wrap",width:"100%" }}>
          {step.processes.map(p => <span key={p} style={{ ...S.tag(PROC_COL),fontSize:9,padding:"1px 6px",whiteSpace:"normal",display:"inline-flex",alignItems:"center",gap:3,maxWidth:"100%",lineHeight:1.35 }}><Ic.Fn/> <span style={{ wordBreak:"break-word" }}>{trN(p,"proc",lang)}</span></span>)}
        </div>
        {(()=>{
          const deg = String.fromCharCode(176);
          const allParams = step.processes.flatMap(p => resolveProcessParams(p, step.tool, step.processParams));
          const shown = allParams.filter(r => r.policy === "R" || r.policy === "O");
          /* Deduplicate by param name — show each param only once */
          const uniq = []; const seen = new Set();
          shown.forEach(r => { if(!seen.has(r.param)){seen.add(r.param);uniq.push(r);} });
          if (!uniq.length) return null;
          const pP = step.processParams || {};
          return <div style={{ display:"flex",justifyContent:"center",gap:3,flexWrap:"wrap" }}>
            {uniq.map(r => {
              const icon = r.param === "time" ? "\u23F1" : "\uD83C\uDF21\uFE0F";
              const label = r.param === "time" ? t.timeLabel : t.tempLabel;
              let bg, color, border, text;
              if (r.source === "tool" || r.source === "tool_cat") {
                bg = "#6BAF6E10"; color = "#6BAF6E"; border = "#6BAF6E25";
                text = r.source === "tool_cat" ? "\u2190 heat" : "\u2190 " + (step.tool?.name || "tool");
              } else if (r.source === "process") {
                bg = "#6BAF6E10"; color = "#6BAF6E"; border = "#6BAF6E25";
                text = r.param === "time" ? `${pP._time||"?"} ${pP._timeUnit||"min"}` : `${pP._temp||"?"}${deg}C`;
              } else if (r.policy === "R") {
                bg = "#D45B5B08"; color = "#D45B5B"; border = "#D45B5B20";
                text = "needed";
              } else {
                bg = "#B0A89808"; color = "#B0A898"; border = "#B0A89815";
                text = "optional";
              }
              return <span key={r.param} style={{ display:"inline-flex",alignItems:"center",gap:2,padding:"1px 5px",borderRadius:4,background:bg,border:`1px solid ${border}`,fontFamily:"'DM Sans',sans-serif",fontSize:7.5,color,lineHeight:1.3 }}>
                <span>{icon}</span><span style={{ fontWeight:600 }}>{label}</span><span style={{ opacity:0.8 }}>{text}</span>
              </span>;
            })}
          </div>;
        })()}
      </div>}
      {hasTool && <div style={{ marginBottom:4,width:"100%" }}><span style={{ ...S.tag(TC),fontSize:10,whiteSpace:"normal",display:"inline-flex",alignItems:"center",gap:4,flexWrap:"wrap",maxWidth:"100%",textAlign:"center",justifyContent:"center",lineHeight:1.35 }}><span style={{ fontSize:12,flexShrink:0 }}>{meta?.ic||"\uD83D\uDD27"}</span> <b style={{ wordBreak:"break-word" }}>{trN(step.tool.name,"tool",lang)}</b>{toolStr && <span style={{ opacity:.7,wordBreak:"break-word" }}>{toolStr}</span>}</span></div>}
      {step.ingredients?.length > 0 && <div style={{ display:"flex",justifyContent:"center",flexWrap:"wrap",gap:3,width:"100%" }}>
        {step.ingredients.map(ing => {
          if (ing.isPrepRef) { const rp=rc.preparations.find(p=>p.id===ing.prepId); return <span key={ing.uid} style={{ ...S.tag(PC),fontSize:9,padding:"1px 5px",whiteSpace:"normal",display:"inline-flex",flexWrap:"wrap",maxWidth:"100%",lineHeight:1.35 }}><Ic.Lk/> <span style={{ wordBreak:"break-word" }}>{rp?.name||ing.name}</span></span>;}
          const res = rQ(ing, allIngs, sv, base);
          const cat = flat.find(fi=>fi.id===ing.ingredientId)?.category || "";
          const col = CC[cat] || "#8A7E72";
          return <span key={ing.uid} style={{ ...S.tag(col),fontSize:9,padding:"1px 5px",whiteSpace:"normal",display:"inline-flex",flexWrap:"wrap",alignItems:"center",gap:2,maxWidth:"100%",lineHeight:1.35 }}>{ing.isEgg&&<Ic.Eg/>}{ing.isChilli&&<Ic.Ci/>}<b style={{ wordBreak:"break-word" }}>{trN(ing.name,"ing",lang)}</b>{ing.isChilli&&ing.chilliHeat&&<span style={{ fontSize:8,color:"#D45B5B",fontWeight:700,textTransform:"uppercase" }}>{CH[ing.chilliHeat]?.label}</span>}<span style={{ wordBreak:"break-word" }}>{fmtQ(res, displayUnit(ing, allIngs))}</span></span>;
        })}
      </div>}
    </div>
  }/>);
}

/* ═══ EDITOR ═══ */
function EdV({ r:recipe, sR, oS, oC, mL, t, lib, tl:tLib, pl, aCI, aCT, aCP, favs, toggleFav, lang }) {
  const [sI, sSI] = useState("");
  const [sT, sST] = useState("");
  const [sP, sSP] = useState("");
  const [oCL, sOCL] = useState({});
  const [oCR, sOCR] = useState({});
  const [drag, sD] = useState(null);
  const [eggM, sEM] = useState(null);
  const [chilliM, sChM] = useState(null);
  const [showMod, sSM] = useState(false);
  const [showAI, sSAI] = useState(false);
  const [showAT, sSAT] = useState(false);
  const [showAP, sSAP] = useState(false);
  const [aPI, sAPI] = useState(0);
  const [dragStep, sDragStep] = useState(null);
  const [drawerOpen, sDO] = useState(false);
  const drawerCloseTimer = useRef(null);
  const openDrawer = () => { if (drawerCloseTimer.current) { clearTimeout(drawerCloseTimer.current); drawerCloseTimer.current = null; } sDO(true); };
  const scheduleCloseDrawer = () => { if (drawerCloseTimer.current) clearTimeout(drawerCloseTimer.current); drawerCloseTimer.current = setTimeout(() => sDO(false), 400); };
  /* Save feedback — shows a toast after saving so user has visual confirmation */
  const [saveFeedback, setSaveFeedback] = useState(null);
  const saveFeedbackTimer = useRef(null);
  const flashSaved = msg => {
    if (saveFeedbackTimer.current) clearTimeout(saveFeedbackTimer.current);
    setSaveFeedback(msg);
    saveFeedbackTimer.current = setTimeout(() => setSaveFeedback(null), 2200);
  };
  /* Tool suggestion: when ingredient drops on empty cell, prompt for tool */
  const [toolSuggest, setToolSuggest] = useState(null); /* { row, lane, ingName } */
  /* Editor servings: show scaled quantities live */
  const [editServ, sES] = useState(recipe.servings);
  useEffect(() => { sES(recipe.servings); }, [recipe.servings]);
  /* Local string for tags input so user can type freely with commas/semicolons without the array re-join interrupting */
  const [tagsStr, setTagsStr] = useState((recipe.tags || []).join(", "));
  useEffect(() => { setTagsStr((recipe.tags || []).join(", ")); }, [recipe.id]);

  /* Editor-side layout measurement for drawing connector arrows live in the editor.
     Mirrors the view-side logic so the user sees their connectors as they build. */
  const editorCellRefs = useRef({});
  const editorGridRef = useRef(null);
  const [editorLayout, setEditorLayout] = useState(null);
  const [editorBounds, setEditorBounds] = useState({ w: 0, h: 0 });

  const r = recipe;
  const up = fn => { const c = JSON.parse(JSON.stringify(r)); fn(c); sR(c); };
  const prep = r.preparations[aPI];
  const grid = prep?.grid || [[null]];
  const { rows, lanes } = gridDims(grid);

  const allIngs = r.preparations.flatMap(p => flattenGrid(p.grid||[[]]).flatMap(s => (s.ingredients||[]).filter(i => !i.isPrepRef)));
  const flat = flLib(lib);

  /* Live flavour radar: recomputes whenever the recipe state changes (any
     ingredient, qty, process, tool, temp, or time edit triggers sR → r changes). */
  const flavourProfile = useMemo(() => computeFlavourProfile(r, lib), [r, lib]);
  const fc = { sweetness:"#E89EC0",richness:"#C49A6C",spiciness:"#D45B5B",acidity:"#E8B84B",umami:"#6B9FC4" };

  /* Measure editor step cells for live connector rendering */
  useLayoutEffect(() => {
    const measure = () => {
      if (!editorGridRef.current) return;
      const contRect = editorGridRef.current.getBoundingClientRect();
      const pos = {};
      let hasAny = false;
      Object.entries(editorCellRefs.current).forEach(([id, el]) => {
        if (!el) return;
        const r = el.getBoundingClientRect();
        pos[id] = { top: r.top - contRect.top, left: r.left - contRect.left, width: r.width, height: r.height };
        hasAny = true;
      });
      if (hasAny) setEditorLayout(pos);
      setEditorBounds({ w: contRect.width, h: editorGridRef.current.scrollHeight });
    };
    measure();
    const raf = requestAnimationFrame(measure);
    const ro = new ResizeObserver(measure);
    if (editorGridRef.current) ro.observe(editorGridRef.current);
    Object.values(editorCellRefs.current).forEach(el => el && ro.observe(el));
    window.addEventListener("resize", measure);
    return () => { cancelAnimationFrame(raf); ro.disconnect(); window.removeEventListener("resize", measure); };
  }, [prep, rows, lanes, editServ, aPI]);

  /* Compute editor horizontal connectors — same logic as view */
  const editorHorizConnectors = useMemo(() => {
    if (!editorLayout) return [];
    const out = [];
    grid.forEach((row, ri) => row.forEach((step, li) => {
      if (step?.connectsTo) step.connectsTo.forEach(ct => {
        for (let r2 = 0; r2 < grid.length; r2++) for (let l2 = 0; l2 < (grid[r2]?.length||0); l2++) {
          const s = grid[r2][l2];
          if (s && s.id === ct.targetId) out.push({ from: step.id, to: s.id, side: ct.side });
        }
      });
    }));
    return out;
  }, [editorLayout, grid]);

  /* Multilingual search: match against English name AND translated name in current lang */
  const matchI = (i, q) => { const ql = q.toLowerCase(); const en = (i.n||"").toLowerCase(); const tr = trN(i.n||"","ing",lang).toLowerCase(); return en.includes(ql) || tr.includes(ql); };
  const matchT = (i, q) => { const ql = q.toLowerCase(); const en = (i.n||"").toLowerCase(); const tr = trN(i.n||"","tool",lang).toLowerCase(); return en.includes(ql) || tr.includes(ql); };
  const matchP = (p, q) => { const ql = q.toLowerCase(); return p.toLowerCase().includes(ql) || trN(p,"proc",lang).toLowerCase().includes(ql); };
  const filtLib = {}; Object.entries(lib).forEach(([c,its]) => { const f=its.filter(i=>matchI(i,sI)); if(f.length) filtLib[c]=f; });
  const filtTL = {}; Object.entries(tLib).forEach(([c,its]) => { const f=its.filter(i=>matchT(i,sT)); if(f.length) filtTL[c]=f; });
  const filtPL = {}; Object.entries(pl).forEach(([c,its]) => { const f=its.filter(p=>matchP(p,sP)); if(f.length) filtPL[c]=f; });

  const dSI = (ing, cat) => sD({ type:"ing", data:{...ing, category:cat} });
  const dSP = p => sD({ type:"prep", data:p });
  const dSTl = tl => sD({ type:"tool", data:tl });
  const dSProc = p => sD({ type:"proc", data:p });

  /* Ensure laneNames array matches lanes */
  const ensureLaneNames = (c, piIdx, needLanes) => {
    const pp = c.preparations[piIdx];
    if (!pp.laneNames) pp.laneNames = [];
    while (pp.laneNames.length < needLanes) pp.laneNames.push(pp.laneNames.length === 0 ? "Main Process" : `Lane ${pp.laneNames.length+1}`);
  };

  const padGrid = (g, needRows, needLanes) => {
    const nr = Math.max(g.length, needRows);
    const nl = Math.max(needLanes, g[0]?.length || 1);
    const ng = [];
    for (let i = 0; i < nr; i++) {
      const row = g[i] || [];
      const newRow = [];
      for (let j = 0; j < nl; j++) newRow.push(row[j] || null);
      ng.push(newRow);
    }
    return ng;
  };

  const dropOnCell = (row, lane) => {
    if (!drag && !dragStep) return;
    up(c => {
      let g = c.preparations[aPI].grid || [[null]];
      g = padGrid(g, row+1, lane+1);
      ensureLaneNames(c, aPI, lane+1);
      if (dragStep) {
        const { row:sr, lane:sl } = dragStep;
        if (sr === row && sl === lane) return;
        const moving = g[sr][sl];
        g[sr][sl] = null;
        if (g[row][lane]) {
          const newRow = Array(g[0].length).fill(null);
          newRow[lane] = moving;
          g.splice(row, 0, newRow);
        } else { g[row][lane] = moving; }
      } else if (drag.type === "ing") {
        const ing = drag.data;
        const wasEmpty = !g[row][lane];
        if (!g[row][lane]) g[row][lane] = { id:uid(), title:"", instruction:"", ingredients:[], processes:[], tool:null };
        if (ing.isEgg) { sEM({ row, lane, ingredient:ing }); }
        else if (ing.isChilli) { sChM({ row, lane, ingredient:ing }); }
        else {
          g[row][lane].ingredients.push({ uid:uid(), ingredientId:ing.id, name:ing.n, qty:1, unit:ing.u||"g" });
          /* Historically we popped a modal asking which tool to use, but this
             felt like an interruption. The user just wants the ingredient to
             land. Tools can be added separately by drag-dropping onto the
             step. (The ToolSuggestModal machinery is kept in place in case we
             later decide to re-enable it on a different trigger, e.g. an
             opt-in "suggest tool" button on each step.) */
        }
      } else if (drag.type === "prep") {
        const p = drag.data;
        if (!g[row][lane]) g[row][lane] = { id:uid(), title:"", instruction:"", ingredients:[], processes:[], tool:null };
        g[row][lane].ingredients.push({ uid:uid(), isPrepRef:true, prepId:p.id, name:p.name });
      } else if (drag.type === "tool") {
        const tl = drag.data;
        if (!g[row][lane]) g[row][lane] = { id:uid(), title:"", instruction:"", ingredients:[], processes:[], tool:null };
        /* Initialize default opts from tool meta: if the tool has a _timeUnit array, pre-seed with its first value
           so that time entered later will be rendered with the correct unit. */
        const defaultOpts = {};
        if (Array.isArray(tl.o?._timeUnit) && tl.o._timeUnit.length) defaultOpts._timeUnit = tl.o._timeUnit[0];
        g[row][lane].tool = { uid:uid(), toolId:tl.id, name:tl.n, opts:defaultOpts };
      } else if (drag.type === "proc") {
        const p = drag.data;
        if (!g[row][lane]) g[row][lane] = { id:uid(), title:"", instruction:"", ingredients:[], processes:[], tool:null };
        if (!g[row][lane].processes) g[row][lane].processes = [];
        if (!g[row][lane].processes.includes(p)) g[row][lane].processes.push(p);
      }
      c.preparations[aPI].grid = g;
    });
    sD(null); sDragStep(null);
  };

  const addEgg = sz => {
    if (!eggM) return;
    const { row, lane, ingredient } = eggM;
    up(c => {
      let g = c.preparations[aPI].grid;
      g = padGrid(g, row+1, lane+1);
      ensureLaneNames(c, aPI, lane+1);
      if (!g[row][lane]) g[row][lane] = { id:uid(), title:"", instruction:"", ingredients:[], processes:[], tool:null };
      g[row][lane].ingredients.push({ uid:uid(), ingredientId:ingredient.id, name:ingredient.n, qty:1, unit:"ea", isEgg:1, eggSize:sz, eggPart:ingredient.ep||"whole" });
      c.preparations[aPI].grid = g;
    });
    sEM(null);
  };

  const addChilli = heat => {
    if (!chilliM) return;
    const { row, lane, ingredient } = chilliM;
    up(c => {
      let g = c.preparations[aPI].grid;
      g = padGrid(g, row+1, lane+1);
      ensureLaneNames(c, aPI, lane+1);
      if (!g[row][lane]) g[row][lane] = { id:uid(), title:"", instruction:"", ingredients:[], processes:[], tool:null };
      g[row][lane].ingredients.push({ uid:uid(), ingredientId:ingredient.id, name:ingredient.n, qty:1, unit:ingredient.u||"ea", isChilli:1, chilliHeat:heat });
      c.preparations[aPI].grid = g;
    });
    sChM(null);
  };

  const addStepAt = (row, lane) => up(c => {
    let g = c.preparations[aPI].grid || [[null]];
    g = padGrid(g, row+1, lane+1);
    ensureLaneNames(c, aPI, lane+1);
    g[row][lane] = { id:uid(), title:"", instruction:"", ingredients:[], processes:[], tool:null };
    c.preparations[aPI].grid = g;
  });
  const insertRow = ri => up(c => {
    const g = c.preparations[aPI].grid;
    const ln = g[0]?.length || 1;
    g.splice(ri, 0, Array(ln).fill(null));
    c.preparations[aPI].grid = g;
  });
  /* Insert lane at position (0 = far left, lanes = far right, n = between) */
  const insertLane = pos => up(c => {
    const g = c.preparations[aPI].grid;
    c.preparations[aPI].grid = g.map(row => { const r = [...row]; r.splice(pos, 0, null); return r; });
    if (!c.preparations[aPI].laneNames) c.preparations[aPI].laneNames = [];
    /* Generate a name that doesn't collide with existing ones */
    const existing = new Set(c.preparations[aPI].laneNames);
    let n = c.preparations[aPI].laneNames.length + 1;
    let name = `Lane ${n}`;
    while (existing.has(name)) { n++; name = `Lane ${n}`; }
    c.preparations[aPI].laneNames.splice(pos, 0, name);
  });
  /* Remove a lane (only if it has no steps — safety check) */
  const removeLane = li => up(c => {
    const g = c.preparations[aPI].grid;
    if (g.length === 0 || (g[0]?.length || 0) <= 1) return; /* never remove last lane */
    /* check column is empty */
    const colEmpty = g.every(row => !row[li]);
    if (!colEmpty) return;
    c.preparations[aPI].grid = g.map(row => { const r = [...row]; r.splice(li, 1); return r; });
    if (c.preparations[aPI].laneNames) c.preparations[aPI].laneNames.splice(li, 1);
  });
  const addPrep = () => { up(c => { c.preparations.push({ id:uid(), name:"", comment:"", isModule:false, laneNames:["Main Process"], grid:[[null]] }); }); sAPI(r.preparations.length); };
  const rmStep = (row, lane) => up(c => { c.preparations[aPI].grid[row][lane] = null; });
  const updStep = (row, lane, fn) => up(c => { const s = c.preparations[aPI].grid[row][lane]; if (s) fn(s); });
  const rmI = (row, lane, uI) => updStep(row, lane, s => { s.ingredients = s.ingredients.filter(i => i.uid !== uI); });
  const upI = (row, lane, uI, f, v) => updStep(row, lane, s => { const i = s.ingredients.find(x => x.uid === uI); if (i) i[f] = v; });
  const rmProc = (row, lane, p) => updStep(row, lane, s => { s.processes = (s.processes||[]).filter(x => x !== p); });
  const rmTool = (row, lane) => updStep(row, lane, s => { s.tool = null; });
  const upTO = (row, lane, no) => updStep(row, lane, s => { if (s.tool) s.tool.opts = no; });
  const rmPrep = pi => { up(c => { c.preparations.splice(pi, 1); }); sAPI(Math.max(0, aPI-1)); };

  /* ── Visio-style click-to-connect ──
     pendingConnect = { stepId, side } while user is picking the target.
     Click source handle: enter pending state.
     Click same source again (or press Esc): cancel.
     Click any other step's handle: create connectsTo { targetId, side } on the SOURCE.
       The `side` stored is the source's side (which edge of the source the arrow leaves from).
     If the source already has a connector on that side, clicking the handle removes it. */
  const [pendingConnect, setPendingConnect] = useState(null);

  const onConnHandleClick = (step, side) => {
    /* If there's already a connector on this handle, remove it and exit pending */
    const existing = (step.connectsTo||[]).find(c => c.side === side);
    if (existing) {
      up(c => {
        const grid = c.preparations[aPI].grid;
        for (let ri=0; ri<grid.length; ri++) for (let li=0; li<grid[ri].length; li++) {
          if (grid[ri][li]?.id === step.id) {
            grid[ri][li].connectsTo = grid[ri][li].connectsTo.filter(x => x.side !== side);
          }
        }
      });
      setPendingConnect(null);
      return;
    }
    /* If nothing pending, start pending */
    if (!pendingConnect) { setPendingConnect({ stepId: step.id, side }); return; }
    /* If clicking the same source handle again, cancel */
    if (pendingConnect.stepId === step.id && pendingConnect.side === side) { setPendingConnect(null); return; }
    /* Otherwise: create connector from pending.source to this step */
    up(c => {
      const grid = c.preparations[aPI].grid;
      for (let ri=0; ri<grid.length; ri++) for (let li=0; li<grid[ri].length; li++) {
        if (grid[ri][li]?.id === pendingConnect.stepId) {
          const src = grid[ri][li];
          if (!src.connectsTo) src.connectsTo = [];
          /* replace any existing on that side */
          src.connectsTo = src.connectsTo.filter(x => x.side !== pendingConnect.side);
          src.connectsTo.push({ targetId: step.id, side: pendingConnect.side });
        }
      }
    });
    setPendingConnect(null);
  };

  /* Esc cancels pending */
  useEffect(() => {
    const onKey = e => { if (e.key === "Escape") setPendingConnect(null); };
    window.addEventListener("keydown", onKey);
    return () => window.removeEventListener("keydown", onKey);
  }, []);

  const aU = [...AU_UNITS, "\u00D7"];

  const impMod = m => {
    up(c => {
      const im = JSON.parse(JSON.stringify(m));
      im.id = uid();
      im.grid = (im.grid||[[null]]).map(row => row.map(step => step ? { ...step, id:uid(), ingredients:(step.ingredients||[]).map(x=>({...x,uid:uid()})), tool:step.tool?{...step.tool,uid:uid()}:null } : null));
      c.preparations.push(im);
    });
    sSM(false);
    sAPI(r.preparations.length);
  };

  const STEP_W = 250;
  const STEP_GAP = 28;
  const laneNames = prep?.laneNames || Array.from({length:lanes}, (_,i) => i === 0 ? "Main Process" : `Lane ${i+1}`);

  return (<div style={{ display:"flex",flexDirection:"column",height:"calc(100vh - 53px)",overflow:"hidden" }}>
    <div style={{ display:"flex",flex:drawerOpen?"1 1 0":"1 1 100%",overflow:"hidden",minHeight:0 }}>
      {/* LEFT: Ingredients */}
      <div style={{ width:210,minWidth:210,borderRight:"1px solid #EDE8E0",background:"#FAF7F2",display:"flex",flexDirection:"column",overflow:"hidden" }}>
        <div style={{ padding:"10px 10px 8px",borderBottom:"1px solid #EDE8E0" }}>
          <div style={{ fontFamily:"'Playfair Display',serif",fontSize:13,fontWeight:600,marginBottom:8 }}>{t.ingredients}</div>
          <div style={{ position:"relative" }}><div style={{ position:"absolute",left:8,top:"50%",transform:"translateY(-50%)",color:"#C0B8AE" }}><Ic.S/></div>
            <input style={{ ...S.inp,paddingLeft:28,fontSize:11 }} placeholder={t.searchIng} value={sI} onChange={e=>sSI(e.target.value)}/></div>
        </div>
        <div style={{ flex:1,overflowY:"auto",padding:"4px 0" }}>
          {/* FAVOURITES section — shown if any favourites exist */}
          {(()=>{
            const favItems = flLib(lib).filter(i => favs.has(i.id));
            if (!favItems.length) return null;
            return (<div>
              <button onClick={()=>sOCL(p=>({...p,__favs:!p.__favs}))} style={{ width:"100%",border:"none",background:"transparent",padding:"5px 10px",display:"flex",alignItems:"center",gap:5,cursor:"pointer",fontFamily:"'DM Sans',sans-serif",fontSize:11,fontWeight:700,color:"#E8B84B" }}>
                <span style={{ fontSize:12 }}>&#9733;</span>Favourites<span style={{ marginLeft:"auto",fontSize:10,color:"#B0A898" }}>{favItems.length}</span><Ic.Ch d={oCL.__favs?"up":"down"}/>
              </button>
              {oCL.__favs && <div style={{ padding:"0 6px 4px" }}>{favItems.map(ing => {
                const col = CC[ing.category] || "#888";
                return <div key={ing.id} draggable onDragStart={()=>dSI(ing,ing.category)} onDragEnd={()=>sD(null)} style={{ display:"flex",alignItems:"center",gap:5,padding:"4px 7px",borderRadius:6,cursor:"grab",marginBottom:2,background:"#FFF",border:`1px solid ${col}20`,fontFamily:"'DM Sans',sans-serif",fontSize:11 }}>
                  <Ic.G/>{ing.isEgg&&<Ic.Eg/>}{ing.isChilli&&<Ic.Ci/>}{trN(ing.n,"ing",lang)}
                  <span style={{ marginLeft:"auto",fontSize:9,color:"#B0A898" }}>{ing.u}</span>
                  <button onClick={e=>{e.stopPropagation();toggleFav(ing.id);}} style={{ background:"transparent",border:"none",cursor:"pointer",color:"#E8B84B",fontSize:12,padding:0,lineHeight:1 }}>&#9733;</button>
                </div>;
              })}</div>}
            </div>);
          })()}
          {r.preparations.length > 1 && (<div>
            <button onClick={()=>sOCL(p=>({...p,__preps:!p.__preps}))} style={{ width:"100%",border:"none",background:"transparent",padding:"5px 10px",display:"flex",alignItems:"center",gap:5,cursor:"pointer",fontFamily:"'DM Sans',sans-serif",fontSize:11,fontWeight:700,color:"#5A5048" }}>
              <div style={{ width:8,height:8,borderRadius:2,background:PC }}/>{t.prepAsIngredient}<span style={{ marginLeft:"auto" }}><Ic.Ch d={oCL.__preps?"up":"down"}/></span>
            </button>
            {oCL.__preps && <div style={{ padding:"0 6px 4px" }}>{r.preparations.map(p => <div key={p.id} draggable onDragStart={()=>dSP(p)} onDragEnd={()=>sD(null)} style={{ display:"flex",alignItems:"center",gap:5,padding:"4px 7px",borderRadius:6,cursor:"grab",marginBottom:2,background:"#FFF",border:`1px solid ${PC}20`,fontFamily:"'DM Sans',sans-serif",fontSize:11 }}><Ic.G/><Ic.Lk/>{p.name||"Untitled"}</div>)}</div>}
          </div>)}
          {Object.entries(filtLib).map(([cat,items]) => { const col = CC[cat] || "#888"; return (<div key={cat}>
            <button onClick={()=>sOCL(p=>({...p,[cat]:!p[cat]}))} style={{ width:"100%",border:"none",background:"transparent",padding:"5px 10px",display:"flex",alignItems:"center",gap:5,cursor:"pointer",fontFamily:"'DM Sans',sans-serif",fontSize:11,fontWeight:700,color:"#5A5048" }}>
              <div style={{ width:8,height:8,borderRadius:2,background:col }}/>{trCat(cat,lang)}<span style={{ marginLeft:"auto",fontSize:10,color:"#B0A898" }}>{items.length}</span><Ic.Ch d={oCL[cat]?"up":"down"}/>
            </button>
            {oCL[cat] && <div style={{ padding:"0 6px 4px" }}>{items.map(ing => <div key={ing.id} draggable onDragStart={()=>dSI(ing,cat)} onDragEnd={()=>sD(null)} style={{ display:"flex",alignItems:"center",gap:5,padding:"4px 7px",borderRadius:6,cursor:"grab",marginBottom:2,background:"#FFF",border:`1px solid ${col}20`,fontFamily:"'DM Sans',sans-serif",fontSize:11 }}>
              <Ic.G/>{ing.isEgg&&<Ic.Eg/>}{ing.isChilli&&<Ic.Ci/>}{trN(ing.n,"ing",lang)}{ing.isCust&&<span style={{ fontSize:8,color:"#6BAF6E",marginLeft:2 }}>&#9733;</span>}
              <span style={{ marginLeft:"auto",fontSize:9,color:"#B0A898" }}>{ing.u}</span>

                      {/* Remove-lane button — only if lane is empty */}
                      {canRemove && <button onClick={()=>removeLane(li)}

                      {/* Insert-between button floats in the gap to the right of this lane */}
                      {li < lanes-1 && <button onClick={()=>insertLane(li+1)}
                        style={{ position:"absolute",top:3,right:-(STEP_GAP/2 + 11),width:22,height:24,padding:0,border:"1.5px dashed #C0B8AE",borderRadius:6,background:"#FDFAF5",color:"#8A7E72",cursor:"pointer",fontSize:12,fontWeight:700,fontFamily:"'DM Sans',sans-serif",zIndex:2 }}

                    </div>);

              </div>

              {/* Grid rows wrapped with a measurement container + SVG overlay for live connectors */}

                  </defs>

                    const a = editorLayout[from], b = editorLayout[to];
                    if (!a || !b) return null;
                    const yA = a.top + a.height/2;
                    const xA = side === "right" ? a.left + a.width : a.left;
                    const oppSide = side === "right" ? "left" : "right";
                    const yB = b.top + b.height/2;
                    const xB = oppSide === "left" ? b.left : b.left + b.width;
                    const OUT = 12;
                    const xA2 = side === "right" ? xA + OUT : xA - OUT;
                    const xB2 = oppSide === "left" ? xB - OUT : xB + OUT;
                    let d;
                    if (Math.abs(yA - yB) < 2) {
                      d = `M ${xA} ${yA} L ${xA2} ${yA} L ${xB2} ${yB} L ${xB} ${yB}`;
                    } else {
                      const midX = (xA2 + xB2) / 2;
                      d = `M ${xA} ${yA} L ${xA2} ${yA} L ${midX} ${yA} L ${midX} ${yB} L ${xB2} ${yB} L ${xB} ${yB}`;
                    }
                    return <path key={`eh-${i}`} d={d} stroke="#6BAF6E" strokeWidth="2" fill="none" markerEnd={`url(#arrHE-${prep.id})`}/>;

                              onUpdate={fn=>updStep(ri,li,fn)}

                            + {t.addStep}<br/><span style={{ fontSize:9,opacity:.7 }}>{t.dropIngHere}</span>

                  <div style={{ display:"flex",gap:STEP_GAP,marginBottom:2,justifyContent:"center",paddingLeft:56 }}>
                    <button onClick={()=>insertRow(ri+1)} style={{ padding:"2px 12px",borderRadius:20,border:"1px dashed #D5CEBC",background:"#FDFAF5",fontSize:9,color:"#B0A898",cursor:"pointer",fontFamily:"'DM Sans',sans-serif" }}>+ {t.insertStep}</button>
                  </div>
                </div>))}
              </div>
            </>)}

          <button style={{ ...S.btn("outline"),width:"100%",fontSize:10,padding:"5px 0" }} onClick={()=>sSAT(true)}><Ic.P/>{t.addTool}</button>
        </div>
      </div>
    </div>

      {drawerOpen && <div style={{ flex:1,overflowY:"auto",overflowX:"auto",padding:"8px 16px",display:"flex",gap:16 }}>
        {Object.entries(filtPL).map(([cat,items]) => <div key={cat} style={{ minWidth:180 }}>
          <div style={{ fontFamily:"'DM Sans',sans-serif",fontSize:10,fontWeight:700,color:"#5A5048",marginBottom:4,letterSpacing:0.5 }}>{trCat(cat,lang)}</div>
          <div style={{ display:"flex",flexWrap:"wrap",gap:3 }}>
            {items.map(p => <div key={p} draggable onDragStart={()=>dSProc(p)} onDragEnd={()=>sD(null)} style={{ display:"inline-flex",alignItems:"center",gap:3,padding:"3px 8px",borderRadius:8,cursor:"grab",background:"#FFF",border:`1px solid ${PROC_COL}25`,fontFamily:"'DM Sans',sans-serif",fontSize:10,color:PROC_COL,fontWeight:600 }}>
              <Ic.G/>{trN(p,"proc",lang)}
            </div>)}
          </div>
        </div>)}
      </div>}
    </div>

    {/* Save-confirmation toast */}
    {saveFeedback && <div style={{ position:"fixed",bottom:24,left:"50%",transform:"translateX(-50%)",background:"#2A2420",color:"#FDFAF5",padding:"10px 20px",borderRadius:10,fontFamily:"'DM Sans',sans-serif",fontSize:13,fontWeight:600,boxShadow:"0 10px 30px rgba(0,0,0,0.25)",zIndex:2000,display:"flex",alignItems:"center",gap:8,animation:"slideUp 0.25s ease-out" }}>
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#6BAF6E" strokeWidth="3" strokeLinecap="round" strokeLinejoin="round"><polyline points="20 6 9 17 4 12"/></svg>
      {saveFeedback}
    </div>}
    <style>{`@keyframes slideUp { from { opacity:0; transform:translate(-50%,10px); } to { opacity:1; transform:translate(-50%,0); } }`}</style>
    {eggM && <EggModal eggM={eggM} addEgg={addEgg} onClose={()=>sEM(null)} t={t}/>}
    {chilliM && <ChilliModal chilliM={chilliM} addChilli={addChilli} onClose={()=>sChM(null)} t={t}/>}
    {showMod && <ModuleModal mL={mL} impMod={impMod} onClose={()=>sSM(false)} t={t}/>}
    {showAI && <AddM t={t} title={t.newIngredient} cats={Object.keys(lib)} showUnit isIngredient onAdd={(n,c,u,extra)=>{aCI(n,c,u,extra);sSAI(false);}} onClose={()=>sSAI(false)} nameP={t.customIngName}/>}
    {showAT && <AddM t={t} title={t.newTool} cats={Object.keys(tLib)} onAdd={(n,c)=>{aCT(n,c);sSAT(false);}} onClose={()=>sSAT(false)} nameP={t.customToolName}/>}
    {showAP && <AddM t={t} title={t.newProcess} cats={Object.keys(pl)} onAdd={(n,c)=>{aCP(n,c);sSAP(false);}} onClose={()=>sSAP(false)} nameP={t.customProcName}/>}
    {/* Tool suggestion modal — shown after dragging ingredient onto empty cell */}
    {toolSuggest && <ToolSuggestModal
      ingName={toolSuggest.ingName} ingCat={toolSuggest.ingCat} tLib={tLib} t={t} lang={lang}
      onSelect={tl => {
        updStep(toolSuggest.row, toolSuggest.lane, s => {
          s.tool = { uid:uid(), toolId:tl.id, name:tl.n, opts:{} };
        });
        setToolSuggest(null);
      }}
      onSkip={() => setToolSuggest(null)}
    />}
  </div>);
}

/* Tool suggestion modal — shows suggested tools for the ingredient just dropped */
function ToolSuggestModal({ ingName, ingCat, tLib, t, lang, onSelect, onSkip }) {
  const suggested = getSuggestedTools(ingCat, tLib);
  const allTools = Object.entries(tLib).flatMap(([cat,items]) => items.map(tl => ({ ...tl, cat })));
  const [search, setSearch] = useState("");
  const filtered = search ? allTools.filter(tl => (tl.n||"").toLowerCase().includes(search.toLowerCase())) : [];

  return (<div style={{ position:"fixed",inset:0,background:"rgba(42,36,32,0.5)",zIndex:1000,display:"flex",alignItems:"center",justifyContent:"center",backdropFilter:"blur(4px)" }} onClick={onSkip}>
    <div onClick={e=>e.stopPropagation()} style={{ background:"#FFF",borderRadius:16,padding:"24px 28px",maxWidth:440,width:"90%",boxShadow:"0 16px 50px rgba(42,36,32,0.2)" }}>
      <div style={{ textAlign:"center",marginBottom:14 }}>
        <div style={{ fontSize:24,marginBottom:4 }}><Ic.Wr/></div>
        <h3 style={{ fontFamily:"'Playfair Display',serif",fontSize:17,margin:"0 0 4px" }}>What tool for <span style={{ color:TC }}>{ingName}</span>?</h3>
        <p style={{ fontFamily:"'DM Sans',sans-serif",fontSize:11,color:"#8A7E72",margin:0 }}>Select a tool to process this ingredient, or skip to add one later.</p>
      </div>

      {/* Suggested tools */}
      {suggested.length > 0 && <div style={{ marginBottom:12 }}>
        <div style={{ fontFamily:"'DM Sans',sans-serif",fontSize:9,fontWeight:700,color:"#B0A898",textTransform:"uppercase",letterSpacing:1,marginBottom:6 }}>Suggested</div>
        <div style={{ display:"flex",flexWrap:"wrap",gap:6 }}>
          {suggested.map(tl => (
            <button key={tl.id} onClick={()=>onSelect(tl)}
              style={{ display:"flex",alignItems:"center",gap:6,padding:"8px 14px",borderRadius:10,border:`1.5px solid ${TC}30`,background:TC+"06",cursor:"pointer",fontFamily:"'DM Sans',sans-serif",fontSize:12,fontWeight:600,color:"#3D352E",transition:"all 0.15s" }}
              onMouseEnter={e=>{e.currentTarget.style.borderColor=TC;e.currentTarget.style.background=TC+"15";}}
              onMouseLeave={e=>{e.currentTarget.style.borderColor=TC+"30";e.currentTarget.style.background=TC+"06";}}>
              <span style={{ fontSize:16 }}>{tl.ic}</span>{trN(tl.n,"tool",lang)}
            </button>
          ))}
        </div>
      </div>}

      {/* Search for other tools */}
      <div style={{ marginBottom:10 }}>
        <div style={{ position:"relative" }}>
          <div style={{ position:"absolute",left:8,top:"50%",transform:"translateY(-50%)",color:"#C0B8AE" }}><Ic.S/></div>
          <input style={{ ...S.inp,paddingLeft:28,fontSize:11 }} placeholder={t.searchTool||"Search all tools..."} value={search} onChange={e=>setSearch(e.target.value)}/>
        </div>
        {filtered.length > 0 && <div style={{ maxHeight:120,overflowY:"auto",marginTop:4,display:"flex",flexWrap:"wrap",gap:4 }}>
          {filtered.slice(0,12).map(tl => (
            <button key={tl.id} onClick={()=>onSelect(tl)}
              style={{ display:"flex",alignItems:"center",gap:4,padding:"5px 10px",borderRadius:8,border:"1px solid #E0D9CF",background:"#FFF",cursor:"pointer",fontFamily:"'DM Sans',sans-serif",fontSize:11 }}
              onMouseEnter={e=>{e.currentTarget.style.borderColor=TC;}} onMouseLeave={e=>{e.currentTarget.style.borderColor="#E0D9CF";}}>
              <span style={{ fontSize:13 }}>{tl.ic}</span>{trN(tl.n,"tool",lang)}
            </button>
          ))}
        </div>}
      </div>

      <div style={{ display:"flex",gap:8,justifyContent:"center" }}>
        <button onClick={onSkip} style={{ ...S.btn("outline"),fontSize:12,padding:"7px 20px" }}>Skip for now</button>
      </div>
    </div>
  </div>);
}

/* Module anchor picker: lets user choose main prep + step to anchor module to */
function ModuleAnchorPicker({ recipe, prep, pi, up, t }) {
  const mainPreps = recipe.preparations.filter(p => !p.isModule);
  const anchorPrep = mainPreps.find(p => p.id === prep.anchorPrepId) || mainPreps[0];
  const mainSteps = anchorPrep ? flattenGrid(anchorPrep.grid||[[]]) : [];
  const moduleSteps = flattenGrid(prep.grid||[[]]);
  if (!mainPreps.length) return null;

  return (<div style={{ background:PC+"08",border:`1px solid ${PC}35`,borderRadius:8,padding:"8px 10px",marginBottom:8 }}>
    <div style={{ fontFamily:"'DM Sans',sans-serif",fontSize:10,fontWeight:700,color:PC,marginBottom:5,textTransform:"uppercase",letterSpacing:0.5 }}>
      <Ic.Mo/> {t.moduleAnchor}
    </div>
    <div style={{ display:"flex",gap:6,alignItems:"center",flexWrap:"wrap" }}>
      <span style={{ fontFamily:"'DM Sans',sans-serif",fontSize:10,color:"#6A6058" }}>Anchor main prep:</span>
      <select value={prep.anchorPrepId||""} onChange={e=>up(c=>{ c.preparations[pi].anchorPrepId = e.target.value || undefined; c.preparations[pi].anchorStepId = undefined; })} style={{ ...S.sel,fontSize:11 }}>
        <option value="">{t.selectAnchor||"(default: last)"}</option>
        {mainPreps.map(mp => <option key={mp.id} value={mp.id}>{mp.name}</option>)}
      </select>
      {anchorPrep && <>
        <span style={{ fontFamily:"'DM Sans',sans-serif",fontSize:10,color:"#6A6058" }}>at main step:</span>
        <select value={prep.anchorStepId||""} onChange={e=>up(c=>{ c.preparations[pi].anchorStepId = e.target.value || undefined; })} style={{ ...S.sel,fontSize:11 }}>
          <option value="">(last)</option>
          {mainSteps.map(s => <option key={s.id} value={s.id}>{s.title||s.id}</option>)}
        </select>
      </>}
      <span style={{ fontFamily:"'DM Sans',sans-serif",fontSize:10,color:"#6A6058" }}>from module step:</span>
      <select value={prep.anchorModuleStepId||""} onChange={e=>up(c=>{ c.preparations[pi].anchorModuleStepId = e.target.value || undefined; })} style={{ ...S.sel,fontSize:11 }}>
        <option value="">(last)</option>
        {moduleSteps.map(s => <option key={s.id} value={s.id}>{s.title||s.id}</option>)}
      </select>
    </div>
  </div>);
}


/* ═══ Step editor card with Visio-style click-to-connect handles ═══ */
function StepEditor({ step, row, lane, lanes, rc, tLib, flat, allIngs, aU, t, editServ, base, lang, onUpdate, onRemove, onRemoveIng, onUpdateIng, onRemoveProc, onRemoveTool, onUpdateToolOpts, onConnHandleClick, pendingConnect, showLeft, showRight, onDragStart, onDragEnd }) {
  const hasTool = !!step.tool;
  const meta = hasTool ? tMeta(step.tool.toolId, tLib) : null;
  const hasConnLeft = (step.connectsTo||[]).some(c => c.side === "left");
  const hasConnRight = (step.connectsTo||[]).some(c => c.side === "right");

  const isPendingSource = (side) => pendingConnect && pendingConnect.stepId === step.id && pendingConnect.side === side;
  const isEligibleTarget = pendingConnect && pendingConnect.stepId !== step.id;

  /* Handle styling:
     - green + filled if already a connector lives here
     - amber + pulsing if this handle is the pending source
     - dimmed grey + glowing if another step is pending (invites this step as target)
     - default: subtle grey */
  const handleStyle = (side, hasConn) => {
    const pendingHere = isPendingSource(side);
    let bg = "#FFF", border = "#D5CEBC", color = "#B0A898";
    if (hasConn) { bg = "#6BAF6E"; border = "#6BAF6E"; color = "#FFF"; }
    if (pendingHere) { bg = "#E8B84B"; border = "#E8B84B"; color = "#FFF"; }
    return {
      position:"absolute",
      [side]: -11, top:"50%", transform:"translateY(-50%)",
      width:22, height:22, borderRadius:"50%",
      border:`1.5px solid ${border}`, background:bg, color,
      cursor:"pointer", display:"flex", alignItems:"center", justifyContent:"center",
      fontSize:11, fontWeight:700, zIndex:10,
      boxShadow: pendingHere ? "0 0 0 4px rgba(232,184,75,0.25)" : (isEligibleTarget ? "0 0 0 3px rgba(107,175,110,0.15)" : "0 1px 3px rgba(42,36,32,0.1)"),
      transition: "all 0.15s",
    };
  };

  return (<div draggable onDragStart={onDragStart} onDragEnd={onDragEnd}
    style={{ background:"#FFF",borderRadius:10,border:"1.5px solid #E0D9CF",padding:"8px 10px",cursor:"grab",boxShadow:"0 1px 4px rgba(42,36,32,0.04)",position:"relative" }}>

    {/* Connector handles: always shown unless at the edge of the lane grid */}
    {showLeft && <button
      onClick={(e)=>{e.stopPropagation();onConnHandleClick("left");}}
      onMouseDown={e=>e.stopPropagation()} /* prevent drag init */
      title={hasConnLeft ? t.connectLeft+" \u2022 click to remove" : (pendingConnect && pendingConnect.stepId!==step.id ? "Click to set as target" : t.connectLeft)}
      style={handleStyle("left", hasConnLeft)}><Ic.ArL/></button>}
    {showRight && <button
      onClick={(e)=>{e.stopPropagation();onConnHandleClick("right");}}
      onMouseDown={e=>e.stopPropagation()}
      title={hasConnRight ? t.connectRight+" \u2022 click to remove" : (pendingConnect && pendingConnect.stepId!==step.id ? "Click to set as target" : t.connectRight)}
      style={handleStyle("right", hasConnRight)}><Ic.ArR/></button>}

    <div style={{ display:"flex",alignItems:"center",gap:5,marginBottom:4 }}>
      <Ic.G/>
      <input value={step.title||""} onChange={e=>onUpdate(s=>{s.title=e.target.value;})} placeholder={t.stepTitle} style={{ ...S.inp,fontFamily:"'Playfair Display',serif",fontSize:12,fontWeight:600,padding:"3px 6px",flex:1 }}/>
      <button onClick={onRemove} style={{ background:"transparent",border:"none",cursor:"pointer",color:"#D45B5B",padding:2 }}><Ic.X/></button>
    </div>
    <textarea value={step.instruction||""} onChange={e=>onUpdate(s=>{s.instruction=e.target.value;})} placeholder={t.stepDesc} rows={1} style={{ ...S.inp,resize:"vertical",lineHeight:1.3,fontSize:10,color:"#6A6058",padding:"3px 6px",marginBottom:4 }}/>

    <div style={{ display:"flex",flexDirection:"column",gap:3,marginBottom:4 }}>
      {(step.processes||[]).map(p => {
        const params = resolveProcessParams(p, step.tool, step.processParams);
        const hasReqs = params.some(r => r.policy === "R" || r.policy === "O");
        const deg = String.fromCharCode(176);
        const ni = { width:42,padding:"2px 3px",borderRadius:4,border:"1px solid #DDD",textAlign:"center",fontSize:9,fontFamily:"'DM Sans',sans-serif" };
        const pP = step.processParams || {};
        const setPP = (k,v) => onUpdate(s => { if(!s.processParams) s.processParams={}; s.processParams[k]=v; });
        return <div key={p} style={{ display:"flex",flexDirection:"column",gap:2 }}>
          <div style={{ display:"flex",alignItems:"center" }}>
            <span style={{ ...S.tag(PROC_COL),fontSize:9,padding:"1px 6px",display:"inline-flex",alignItems:"center",gap:3 }}><Ic.Fn/>{trN(p,"proc",lang)}<button onClick={()=>onRemoveProc(p)} style={{ background:"transparent",border:"none",cursor:"pointer",color:"#C0B0A0",padding:0,fontSize:11 }}>&times;</button></span>
          </div>
          {hasReqs && <div style={{ display:"flex",flexWrap:"wrap",gap:3,paddingLeft:4,alignItems:"center" }}>
            {params.map(r => {
              if (r.policy === "F") return null;
              const isReq = r.policy === "R";
              const icon = r.param === "time" ? "\u23F1" : "\uD83C\uDF21\uFE0F";
              const label = r.param === "time" ? t.timeLabel : t.tempLabel;

              /* Case 1: Tool provides it — show green read-only badge */
              if (r.source === "tool" || r.source === "tool_cat") {
                return <span key={r.param} style={{ display:"inline-flex",alignItems:"center",gap:3,padding:"1px 6px",borderRadius:5,background:"#6BAF6E12",border:"1px solid #6BAF6E30",fontFamily:"'DM Sans',sans-serif",fontSize:8,color:"#6BAF6E",lineHeight:1.4 }}>
                  <span>{icon}</span>
                  <span style={{ fontWeight:600 }}>{label}</span>
                  <span style={{ opacity:0.8 }}>{r.source === "tool_cat" ? "\u2190 heat" : "\u2190 " + (step.tool?.name||"tool")}</span>
                </span>;
              }

              /* Case 2: Tool does NOT provide it — show editable input.
                 Green border+tint when a value is set, red/grey when empty. */
              const hasValue = r.source === "process";
              const emptyColor = isReq ? "#D45B5B" : "#B0A898";
              const borderCol = hasValue ? "#6BAF6E30" : (isReq ? "#D45B5B25" : "#B0A89820");
              const bgCol = hasValue ? "#6BAF6E08" : (isReq ? "#D45B5B08" : "#B0A89808");
              const labelCol = hasValue ? "#6BAF6E" : emptyColor;

              if (r.param === "time") {
                const curUnit = pP._timeUnit || "min";
                return <div key={r.param} onMouseDown={e=>e.stopPropagation()} onClick={e=>e.stopPropagation()} style={{ display:"inline-flex",alignItems:"center",gap:3,padding:"2px 5px",borderRadius:5,background:bgCol,border:`1px solid ${borderCol}`,fontFamily:"'DM Sans',sans-serif",fontSize:8 }}>
                  <span>{icon}</span>
                  <span style={{ fontWeight:600,color:labelCol }}>{label}</span>
                  <input type="number" min="0" step="any"
                    value={pP._time != null && pP._time > 0 ? pP._time : ""}
                    onMouseDown={e=>e.stopPropagation()}
                    onFocus={e=>e.stopPropagation()}
                    onChange={e=>onUpdate(s=>{ if(!s.processParams) s.processParams={}; s.processParams._time=+e.target.value; s.processParams._timeUnit=curUnit; })}
                    placeholder="?" style={{...ni,width:32,borderColor:hasValue?"#6BAF6E60":(isReq?"#D45B5B60":"#DDD")}}/>
                  <select value={curUnit}
                    onMouseDown={e=>e.stopPropagation()}
                    onChange={e=>onUpdate(s=>{ if(!s.processParams) s.processParams={}; s.processParams._timeUnit=e.target.value; })}
                    style={{ padding:"1px 2px",borderRadius:3,border:"1px solid #DDD",fontSize:8,fontFamily:"'DM Sans',sans-serif",background:"#FFF" }}>
                    <option value="sec">sec</option><option value="min">min</option><option value="hr">hr</option>
                  </select>
                </div>;
              }

              if (r.param === "temp") {
                return <div key={r.param} onMouseDown={e=>e.stopPropagation()} onClick={e=>e.stopPropagation()} style={{ display:"inline-flex",alignItems:"center",gap:3,padding:"2px 5px",borderRadius:5,background:bgCol,border:`1px solid ${borderCol}`,fontFamily:"'DM Sans',sans-serif",fontSize:8 }}>
                  <span>{icon}</span>
                  <span style={{ fontWeight:600,color:labelCol }}>{label}</span>
                  <input type="number" min="0" step="1"
                    value={pP._temp != null && pP._temp > 0 ? pP._temp : ""}
                    onMouseDown={e=>e.stopPropagation()}
                    onFocus={e=>e.stopPropagation()}
                    onChange={e=>onUpdate(s=>{ if(!s.processParams) s.processParams={}; s.processParams._temp=+e.target.value; })}
                    placeholder="?" style={{...ni,width:36,borderColor:hasValue?"#6BAF6E60":(isReq?"#D45B5B60":"#DDD")}}/>
                  <span style={{ color:"#8A7E72",fontSize:8 }}>{deg}C</span>
                </div>;
              }
              return null;
            })}
          </div>}
        </div>;
      })}
    </div>

    {hasTool ? (
      <div style={{ background:TC+"08",border:`1px solid ${TC}25`,borderRadius:8,padding:"6px 8px",marginBottom:4 }}>
        <div style={{ display:"flex",alignItems:"center",gap:4 }}>
          <span style={{ fontSize:13 }}>{meta?.ic||"\uD83D\uDD27"}</span>
          <span style={{ fontFamily:"'DM Sans',sans-serif",fontWeight:700,fontSize:11,color:TC,flex:1 }}>{trN(step.tool.name,"tool",lang)}</span>
          <button onClick={onRemoveTool} style={{ background:"transparent",border:"none",cursor:"pointer",color:"#C0B0A0",fontSize:11 }}>&times;</button>
        </div>
        <ToolOpts meta={meta} opts={step.tool.opts} onChange={onUpdateToolOpts} t={t}/>
      </div>
    ) : <div style={{ fontSize:9,color:TC+"80",fontStyle:"italic",marginBottom:4,padding:"2px 4px" }}>{t.dropToolHere}</div>}

    <div style={{ display:"flex",flexWrap:"wrap",gap:3 }}>
      {step.ingredients.map(ing => {
        if (ing.isPrepRef) { const rp = rc.preparations.find(p => p.id === ing.prepId); return (
          <div key={ing.uid} style={{ display:"inline-flex",alignItems:"center",gap:3,padding:"2px 5px",borderRadius:6,background:PC+"14",border:`1px solid ${PC}28`,fontSize:10 }}>
            <Ic.Lk/><span style={{ fontWeight:600,color:PC }}>{rp?.name||ing.name}</span>
            <button onClick={()=>onRemoveIng(ing.uid)} style={{ background:"transparent",border:"none",cursor:"pointer",color:"#C0B0A0",padding:0,fontSize:11 }}>&times;</button>
          </div>);}
        const cat = flat.find(fi=>fi.id===ing.ingredientId)?.category || "";
        const col = CC[cat] || "#8A7E72";
        const eg = eG(ing);
        /* LIVE scaled preview for editor */
        const scaled = rQ(ing, allIngs, editServ, base);
        return (<div key={ing.uid} style={{ display:"inline-flex",alignItems:"center",gap:2,padding:"2px 4px",borderRadius:6,background:col+"12",border:`1px solid ${col}28`,fontFamily:"'DM Sans',sans-serif",fontSize:10 }}>
          {ing.isEgg && <Ic.Eg/>}{ing.isChilli && <Ic.Ci/>}<span style={{ fontWeight:600,color:col }}>{trN(ing.name,"ing",lang)}</span>
          {eg && <span style={{ fontSize:9,color:"#999" }}>({ing.eggSize})</span>}
          <input type="number" step="any" min="0" value={ing.qty} onChange={e=>onUpdateIng(ing.uid,"qty",+e.target.value)} style={{ width:36,padding:"1px 2px",borderRadius:3,border:"1px solid #DDD",textAlign:"center",fontSize:9 }}/>
          <select value={ing.unit} onChange={e=>onUpdateIng(ing.uid,"unit",e.target.value)} style={{ ...S.sel,padding:"1px 2px",fontSize:9 }}>{aU.map(u=><option key={u} value={u}>{u==="\u00D7"?"\u00D7":u}</option>)}</select>
          {editServ !== base && <span style={{ fontSize:9,color:"#6BAF6E",fontWeight:700,background:"#6BAF6E12",padding:"0 4px",borderRadius:3 }}>→ {fmtQ(scaled, displayUnit(ing, allIngs))}</span>}
          {ing.unit === "\u00D7" && <>
            <select value={ing.multiplierRef||""} onChange={e=>onUpdateIng(ing.uid,"multiplierRef",e.target.value)} style={{ ...S.sel,padding:"1px 2px",fontSize:9,maxWidth:60 }}><option value="">ref?</option>{allIngs.filter(a=>a.uid!==ing.uid).map(a=><option key={a.uid} value={a.uid}>{a.name}</option>)}</select>
            <select value={ing.multiplierUnit||"g"} onChange={e=>onUpdateIng(ing.uid,"multiplierUnit",e.target.value)} style={{ ...S.sel,padding:"1px 2px",fontSize:9,maxWidth:32 }}>{["g","kg","ml","L"].map(u=><option key={u} value={u}>{u}</option>)}</select>
          </>}
          {ing.isEgg && <select value={ing.eggSize||"Large"} onChange={e=>onUpdateIng(ing.uid,"eggSize",e.target.value)} style={{ ...S.sel,padding:"1px 2px",fontSize:9 }}>{Object.keys(ED).map(s=><option key={s} value={s}>{s}</option>)}</select>}
          {ing.isChilli && <select value={ing.chilliHeat||"md"} onChange={e=>onUpdateIng(ing.uid,"chilliHeat",e.target.value)} title={t.chilliHeatHint} style={{ ...S.sel,padding:"1px 2px",fontSize:9 }}>{Object.entries(CH).map(([k,d])=><option key={k} value={k}>{d.label}</option>)}</select>}
          <button onClick={()=>onRemoveIng(ing.uid)} style={{ background:"transparent",border:"none",cursor:"pointer",color:"#C0B0A0",padding:0,fontSize:11 }}>&times;</button>
        </div>);
      })}
    </div>
  </div>);
}

function EggModal({ eggM, addEgg, onClose, t }) {
  return (<div style={{ position:"fixed",inset:0,background:"rgba(42,36,32,0.5)",zIndex:1000,display:"flex",alignItems:"center",justifyContent:"center",backdropFilter:"blur(4px)" }} onClick={onClose}>
    <div onClick={e=>e.stopPropagation()} style={{ background:"#FFF",borderRadius:16,padding:"24px 28px",maxWidth:400,width:"90%",boxShadow:"0 16px 50px rgba(42,36,32,0.2)" }}>
      <div style={{ textAlign:"center",marginBottom:4 }}><div style={{ fontSize:28,marginBottom:6 }}>&#129370;</div>
        <h3 style={{ fontFamily:"'Playfair Display',serif",fontSize:18,margin:"0 0 3px" }}>{t.selectEggSize}</h3>
        <p style={{ fontFamily:"'DM Sans',sans-serif",fontSize:12,color:"#8A7E72",margin:"0 0 14px" }}>{t.eggStandard}</p></div>
      <div style={{ display:"flex",flexDirection:"column",gap:6 }}>
        {Object.entries(ED).map(([sz,d]) => <button key={sz} onClick={()=>addEgg(sz)} style={{ display:"flex",alignItems:"center",justifyContent:"space-between",padding:"10px 14px",borderRadius:10,border:"1.5px solid #EDE8E0",background:"#FDFAF5",cursor:"pointer",fontFamily:"'DM Sans',sans-serif",fontSize:12 }}
          onMouseEnter={e=>{e.currentTarget.style.borderColor="#E8B84B";}} onMouseLeave={e=>{e.currentTarget.style.borderColor="#EDE8E0";}}>
          <b>{sz}</b><span style={{ color:"#8A7E72",fontSize:11 }}>{t.whole}:{d.w} g {t.white}:{d.wh} g</span><span style={{ fontSize:10,color:"#B0A898" }}>{d.c}</span></button>)}</div>

}

/* Chilli Modal — pick a heat level so the recipe's spiciness reflects the
   real Scoville intensity of the variety. Pre-selects the library entry's
   defaultHeat. Same pattern as EggModal. */

  return (<div style={{ position:"fixed",inset:0,background:"rgba(42,36,32,0.5)",zIndex:1000,display:"flex",alignItems:"center",justifyContent:"center",backdropFilter:"blur(4px)" }} onClick={onClose}>
    <div onClick={e=>e.stopPropagation()} style={{ background:"#FFF",borderRadius:16,padding:"24px 28px",maxWidth:440,width:"90%",boxShadow:"0 16px 50px rgba(42,36,32,0.2)" }}>
      <div style={{ textAlign:"center",marginBottom:4 }}><div style={{ fontSize:28,marginBottom:6 }}>&#127798;</div>
        <h3 style={{ fontFamily:"'Playfair Display',serif",fontSize:18,margin:"0 0 3px" }}>{t.selectChilliHeat}</h3>
        <p style={{ fontFamily:"'DM Sans',sans-serif",fontSize:12,color:"#8A7E72",margin:"0 0 14px" }}>{t.chilliHeatHint}</p></div>
      <div style={{ display:"flex",flexDirection:"column",gap:6 }}>
        {Object.entries(CH).map(([k, d]) => {
          const isDef = k === def;
          const col = accent[k] || "#D45B5B";
          return (<button key={k} onClick={()=>addChilli(k)} style={{ display:"flex",alignItems:"center",gap:10,padding:"10px 14px",borderRadius:10,border:`1.5px solid ${isDef?col:"#EDE8E0"}`,background:isDef?col+"10":"#FDFAF5",cursor:"pointer",fontFamily:"'DM Sans',sans-serif",fontSize:12,textAlign:"left" }}
            onMouseEnter={e=>{e.currentTarget.style.borderColor=col;}} onMouseLeave={e=>{e.currentTarget.style.borderColor=isDef?col:"#EDE8E0";}}>
            {/* Heat bars — visual meter showing relative intensity */}
            <div style={{ display:"flex",gap:2,flexShrink:0 }}>
              {["m","md","h","vh","ex"].map(k2 => {
                const active = Object.keys(CH).indexOf(k) >= Object.keys(CH).indexOf(k2);
                return <div key={k2} style={{ width:6,height:14,borderRadius:1.5,background:active?accent[k2]:"#F0EBE3" }}/>;
              })}
            </div>
            <div style={{ flex:1 }}>
              <b style={{ color:col }}>{d.label}</b>
              {isDef && <span style={{ fontSize:9,color:col,marginLeft:6,textTransform:"uppercase",letterSpacing:0.6 }}>default</span>}
              <div style={{ fontSize:10,color:"#8A7E72",marginTop:1 }}>{d.examples}</div>
            </div>
            <span style={{ fontFamily:"'JetBrains Mono',monospace",fontSize:10,color:"#B0A898",flexShrink:0 }}>~{d.shu.toLocaleString()} SHU</span>
          </button>);
        })}
      </div>
    </div></div>);
}
