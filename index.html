/* ── AI flavour-profile helper ──────────────────────────────────────────────
   When the user adds a custom ingredient, they can press "Analyse with AI"
   to have Claude predict a 5-axis flavour vector plus chilli-ness + default
   heat. The API call goes from the browser directly to Anthropic using a
   key the user provides and which is stored only in localStorage. The
   response is parsed as JSON; the user is always free to override before
   saving.
   Output shape:
     { s, r, p, a, u: number(0..1),
       isChilli: boolean,
       defaultHeat: "m"|"md"|"h"|"vh"|"ex" | null,
       note: string }
─────────────────────────────────────────────────────────────────────────── */
const AI_PROMPT = (name, category) => `You are a culinary-science assistant helping assess a single ingredient for a recipe app's flavour radar.

Ingredient name: ${name}
Category: ${category}

Rate this ingredient's inherent flavour on 5 axes. Each value is between 0.00 and 1.00 representing the intensity per typical serving (not raw chemical content). The axes:
- sweetness (sugar-driven perceived sweetness)
- richness (fat/mouthfeel richness)
- spiciness (capsaicin/piperine heat)
- acidity (tart/sour/tangy)
- umami (glutamate-driven savouriness)

Guidelines:
- Caster sugar: s=1.00 others=0
- Butter: s=0, r=0.95, p=0, a=0, u=0.10
- Parmesan: s=0, r=0.65, p=0, a=0.05, u=1.00
- Lemon juice: s=0, r=0, p=0, a=0.95, u=0
- A raw, generic red chilli (any heat level): s=0, r=0, p=0.85, a=0.10, u=0.05
- Mozzarella: s=0, r=0.50, p=0, a=0.05, u=0.25

If the ingredient IS a chilli / pepper with real heat, set isChilli:true and pick defaultHeat from {"m","md","h","vh","ex"} where:
- m = ~250 SHU (bell pepper, pimiento)
- md = ~2500 SHU (jalape\u00F1o, poblano, Aj\u00ED Verde)
- h = ~25000 SHU (serrano, cayenne, Thai bird's eye)
- vh = ~150000 SHU (habanero, Scotch bonnet)
- ex = ~1500000 SHU (ghost, reaper)
Otherwise isChilli:false and defaultHeat:null.

For chillies: use p=0.85 as the base and let defaultHeat handle the intensity — do NOT boost p beyond 0.85.

Respond with ONLY a single JSON object, no prose, no markdown fences. Shape:
{"s":0.0,"r":0.0,"p":0.0,"a":0.0,"u":0.0,"isChilli":false,"defaultHeat":null,"note":"one-sentence explanation"}`;

async function analyseIngredientWithAI(name, category, apiKey) {
  let res;
  try {
    res = await fetch("https://api.anthropic.com/v1/messages", {
      method: "POST",
      headers: {
        "Content-Type": "application/json",
        "x-api-key": apiKey,
        "anthropic-version": "2023-06-01",
        "anthropic-dangerous-direct-browser-access": "true",
      },
      body: JSON.stringify({
        model: "claude-haiku-4-5-20251001",
        max_tokens: 400,
        messages: [{ role: "user", content: AI_PROMPT(name, category) }],
      }),
    });
  } catch (netErr) {
    /* Network failure — CORS block, offline, DNS, etc. */
    throw new Error("network: " + (netErr.message || "fetch failed") + " (may be a CORS or connectivity issue)");
  }
  if (!res.ok) {
    let detail = "";
    try {
      const errText = await res.text();
      /* Try to parse as JSON error object for a cleaner message */
      try {
        const errObj = JSON.parse(errText);
        detail = errObj?.error?.message || errObj?.message || errText.slice(0, 200);
      } catch { detail = errText.slice(0, 200); }
    } catch {}
    throw new Error(`HTTP ${res.status}: ${detail || res.statusText}`);
  }
  const data = await res.json();
  const txt = (data?.content?.[0]?.text || "").trim();
  /* Defensive JSON extraction: strip code fences, then find the first
     balanced {...} block. Models sometimes prepend a sentence despite
     instructions, so we don't assume the response is pure JSON. */
  let cleaned = txt.replace(/^```(?:json)?\s*|\s*```$/g, "").trim();
  if (!cleaned.startsWith("{")) {
    const first = cleaned.indexOf("{");
    const last  = cleaned.lastIndexOf("}");
    if (first >= 0 && last > first) cleaned = cleaned.slice(first, last + 1);
  }
  let obj;
  try { obj = JSON.parse(cleaned); }
  catch (parseErr) { throw new Error("could not parse JSON from AI response: " + txt.slice(0, 120)); }
  /* Validate/clip */
  const clamp = v => Math.max(0, Math.min(1, Number(v) || 0));
  return {
    s: clamp(obj.s),
    r: clamp(obj.r),
    p: clamp(obj.p),
    a: clamp(obj.a),
    u: clamp(obj.u),
    isChilli: !!obj.isChilli,
    defaultHeat: ["m","md","h","vh","ex"].includes(obj.defaultHeat) ? obj.defaultHeat : null,
    note: String(obj.note || "").slice(0, 200),
  };
}

function AddM({ t, title, cats, showUnit, onAdd, onClose, nameP, isIngredient }) {
  const [n, sN] = useState("");
  const [c, sC] = useState(cats[0]||"");
  const [u, sU] = useState("g");
  /* Flavour vector (0..100 in UI, 0..1 when persisted) */
  const [fw, setFw] = useState({ s:0, r:0, p:0, a:0, u:0 });
  const [isChilli, setIsChilli] = useState(false);
  const [defaultHeat, setDefaultHeat] = useState("md");
  const [apiKey, setApiKey] = useState(() => { try { return localStorage.getItem("anthropic_api_key") || ""; } catch { return ""; }});
  const [showKeyField, setShowKeyField] = useState(false);
  const [aiStatus, setAiStatus] = useState(null); /* null | "loading" | "done" | "error" */
  const [aiNote, setAiNote] = useState("");
  const [aiError, setAiError] = useState("");
  const ok = n.trim() && c;

  /* Save the API key as the user types it — convenience for repeated use */
  const saveApiKey = v => {
    setApiKey(v);
    try { localStorage.setItem("anthropic_api_key", v); } catch {}
  };

  /* Trigger the AI analysis. We surface every failure mode clearly: missing
     name (should already be blocked by disabled state), missing API key
     (show a visible message so the user knows what to do), or network /
     API errors (surface the error text verbatim from the API response). */
  const runAI = async () => {
    if (!n.trim()) { setAiStatus("error"); setAiError(t.aiFailed + ": name required"); return; }
    if (!apiKey.trim()) {
      setShowKeyField(true);
      setAiStatus("error");
      setAiError(t.aiNeedsKey);
      return;
    }
    setAiStatus("loading"); setAiError(""); setAiNote("");
    try {
      const r = await analyseIngredientWithAI(n.trim(), c, apiKey.trim());
      setFw({ s:r.s, r:r.r, p:r.p, a:r.a, u:r.u });
      setIsChilli(r.isChilli);
      if (r.defaultHeat) setDefaultHeat(r.defaultHeat);
      setAiNote(r.note);
      setAiStatus("done");
    } catch (e) {
      setAiStatus("error");
      setAiError(String(e.message || e));
    }
  };

  /* Save: pass the flavour vector as fw (0..1) and optional chilli metadata */
  const handleSave = () => {
    if (!ok) return;
    if (!isIngredient) return onAdd(n.trim(), c, u);
    const hasAnyFw = fw.s || fw.r || fw.p || fw.a || fw.u;
    const extra = {};
    if (hasAnyFw) extra.fw = { s:+fw.s.toFixed(2), r:+fw.r.toFixed(2), p:+fw.p.toFixed(2), a:+fw.a.toFixed(2), u:+fw.u.toFixed(2) };
    if (isChilli) { extra.isChilli = 1; extra.defaultHeat = defaultHeat; }
    onAdd(n.trim(), c, u, extra);
  };

  /* Axis slider row — compact, with its palette color */
  const axisCol = { s:"#E89EC0",r:"#C49A6C",p:"#D45B5B",a:"#E8B84B",u:"#6B9FC4" };
  const axisLabel = { s:t.sweetness, r:t.richness, p:t.spiciness, a:t.acidity, u:t.umami };

  return (<div style={{ position:"fixed",inset:0,background:"rgba(42,36,32,0.5)",zIndex:1000,display:"flex",alignItems:"center",justifyContent:"center",backdropFilter:"blur(4px)" }} onClick={onClose}>
    <div onClick={e=>e.stopPropagation()} style={{ background:"#FFF",borderRadius:16,padding:"22px 26px",maxWidth:isIngredient?460:380,width:"92%",maxHeight:"88vh",overflowY:"auto",boxShadow:"0 16px 50px rgba(42,36,32,0.2)" }}>
      <h3 style={{ fontFamily:"'Playfair Display',serif",fontSize:18,margin:"0 0 14px" }}>{title}</h3>
      <div style={{ display:"flex",flexDirection:"column",gap:10 }}>
        <input value={n} onChange={e=>sN(e.target.value)} placeholder={nameP} style={S.inp}/>
        <div><label style={{ fontFamily:"'DM Sans',sans-serif",fontSize:11,color:"#8A7E72",marginBottom:3,display:"block" }}>{t.customIngCat} *</label>
        <select value={c} onChange={e=>sC(e.target.value)} style={{ ...S.sel,width:"100%",padding:"6px 10px" }}>{cats.map(x=><option key={x} value={x}>{x}</option>)}</select></div>
        {showUnit && <div><label style={{ fontFamily:"'DM Sans',sans-serif",fontSize:11,color:"#8A7E72",marginBottom:3,display:"block" }}>{t.customIngUnit}</label>
        <select value={u} onChange={e=>sU(e.target.value)} style={{ ...S.sel,width:"100%",padding:"6px 10px" }}>{AU_UNITS.map(x=><option key={x} value={x}>{x}</option>)}</select></div>}

        {/* AI / flavour vector — only for ingredients */}
        {isIngredient && (<>
          <div style={{ height:1,background:"#EDE8E0",margin:"4px 0 2px" }}/>

          {/* Header with label + button side-by-side */}
          <div style={{ display:"flex",alignItems:"center",justifyContent:"space-between",gap:8 }}>
            <label style={{ fontFamily:"'DM Sans',sans-serif",fontSize:11,fontWeight:700,color:"#6A6150",textTransform:"uppercase",letterSpacing:0.6 }}>{t.flavourProfile}</label>
            <button
              onClick={runAI}
              disabled={!n.trim() || !apiKey.trim() || aiStatus==="loading"}
              title={!n.trim() ? "Enter a name first" : !apiKey.trim() ? t.aiNeedsKey : ""}
              style={{ ...S.btn("outline"),fontSize:10,padding:"4px 10px",borderColor:"#8B5CF6",color:"#8B5CF6",opacity:(!n.trim()||!apiKey.trim()||aiStatus==="loading")?0.4:1,cursor:(!n.trim()||!apiKey.trim()||aiStatus==="loading")?"not-allowed":"pointer" }}
            >
              {aiStatus==="loading" ? "\u231B " + t.analysing : "\u2728 " + t.analyseWithAI}
            </button>
          </div>

          {/* API key field — ALWAYS visible when no key is set, so the user
              immediately understands what input is required for AI to work.
              When a key is saved, the field collapses to a tiny "edit" link. */}
          {(showKeyField || !apiKey) ? (
            <div style={{ background:!apiKey?"#FEF9E7":"transparent",border:!apiKey?"1px dashed #E8B84B":"none",borderRadius:6,padding:!apiKey?"6px 8px":0 }}>
              <label style={{ fontFamily:"'DM Sans',sans-serif",fontSize:10,color:"#6A6150",marginBottom:3,display:"flex",alignItems:"center",gap:4,fontWeight:600 }}>
                {!apiKey && <span style={{ color:"#E8B84B" }}>&#9888;</span>}{t.apiKey}
              </label>
              <input type="password" value={apiKey} onChange={e=>saveApiKey(e.target.value)} placeholder="sk-ant-..." style={{ ...S.inp,fontSize:11,fontFamily:"'JetBrains Mono',monospace" }}/>
              <div style={{ fontSize:9,color:"#8A7E72",marginTop:3,fontStyle:"italic" }}>{t.apiKeyHint}</div>
              {!apiKey && <div style={{ fontSize:10,color:"#8A5E00",marginTop:4,fontWeight:600 }}>{t.aiNeedsKey}</div>}
            </div>
          ) : (
            <button onClick={()=>setShowKeyField(true)} style={{ background:"transparent",border:"none",color:"#B0A898",fontSize:9,textAlign:"left",cursor:"pointer",padding:0,fontFamily:"'DM Sans',sans-serif",textDecoration:"underline",alignSelf:"flex-start" }}>edit API key</button>
          )}

          {/* Status messages */}
          {aiStatus==="error" && <div style={{ fontSize:10,color:"#D45B5B",background:"#D45B5B10",padding:"5px 8px",borderRadius:6 }}><b>{t.aiFailed}</b>: {aiError}</div>}
          {aiStatus==="done" && aiNote && <div style={{ fontSize:10,color:"#6A6150",background:"#8B5CF610",padding:"5px 8px",borderRadius:6,fontStyle:"italic" }}>{t.aiDetected}: {aiNote}</div>}

          {/* Flavour sliders */}
          <div style={{ display:"flex",flexDirection:"column",gap:4,padding:"8px 10px",background:"#FAF7F2",borderRadius:8 }}>
            {["s","r","p","a","u"].map(k => (
              <div key={k} style={{ display:"flex",alignItems:"center",gap:8 }}>
                <span style={{ fontFamily:"'DM Sans',sans-serif",fontSize:10,width:58,color:"#6A6150" }}>{axisLabel[k]}</span>
                <input type="range" min="0" max="1" step="0.05" value={fw[k]} onChange={e=>setFw(p=>({...p,[k]:+e.target.value}))} style={{ flex:1,accentColor:axisCol[k] }}/>
                <span style={{ fontFamily:"'JetBrains Mono',monospace",fontSize:10,width:32,textAlign:"right",color:axisCol[k],fontWeight:600 }}>{fw[k].toFixed(2)}</span>
              </div>
            ))}
            {aiStatus==="done" && <div style={{ fontSize:9,color:"#B0A898",marginTop:2,fontStyle:"italic",textAlign:"center" }}>{t.aiGuessed}</div>}
          </div>

          {/* Chilli toggle */}
          <label style={{ display:"flex",alignItems:"center",gap:6,fontSize:11,color:"#6A6150",fontFamily:"'DM Sans',sans-serif",cursor:"pointer" }}>
            <input type="checkbox" checked={isChilli} onChange={e=>setIsChilli(e.target.checked)}/>
            <Ic.Ci/>{t.markAsChilli}
            {isChilli && <select value={defaultHeat} onChange={e=>setDefaultHeat(e.target.value)} style={{ ...S.sel,padding:"1px 4px",fontSize:10,marginLeft:6 }}>{Object.entries(CH).map(([k,d])=><option key={k} value={k}>{d.label}</option>)}</select>}
          </label>
        </>)}

        <div style={{ display:"flex",gap:6,marginTop:4 }}>
          <button onClick={onClose} style={{ ...S.btn("outline"),flex:1 }}>{t.cancel}</button>
          <button onClick={handleSave} disabled={!ok} style={{ ...S.btn("primary"),flex:1,opacity:ok?1:0.4 }}><Ic.P/> {t.save}</button>
        </div>
      </div>
    </div></div>);
}


    const root = ReactDOM.createRoot(document.getElementById("root"));
    root.render(React.createElement(App));
  </script>
